<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineAI — Talk to Movies Like Never Before</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f14;
      --bg-soft: #151522;
      --text: #ecf0ff;
      --muted: #9ca5c8;
      --accent-1: #8a5cff;
      --accent-2: #38b6ff;
      --accent-3: #ff4ecd;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --transition: 280ms cubic-bezier(.2,.75,.2,1);
      --container: min(1200px, 92vw);
      --nav-h: 78px;
    }

    body.light {
      --bg: #f3f5ff;
      --bg-soft: #e8ecff;
      --text: #10152a;
      --muted: #4b5578;
      --glass: rgba(255, 255, 255, 0.62);
      --glass-border: rgba(70, 76, 114, 0.2);
      --shadow: 0 20px 50px rgba(111, 124, 181, 0.24);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 12% 8%, rgba(138, 92, 255, 0.22), transparent 38%),
                  radial-gradient(circle at 82% 20%, rgba(56, 182, 255, 0.2), transparent 36%),
                  radial-gradient(circle at 50% 100%, rgba(255, 78, 205, 0.15), transparent 45%),
                  var(--bg);
      color: var(--text);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -20vmax;
      background: conic-gradient(from 90deg at 50% 50%, rgba(138, 92, 255, 0.09), rgba(56, 182, 255, 0.09), rgba(255, 78, 205, 0.1), rgba(138, 92, 255, 0.09));
      filter: blur(120px);
      pointer-events: none;
      z-index: -3;
      animation: spinGlow 30s linear infinite;
    }

    body::after {
      animation-direction: reverse;
      animation-duration: 45s;
      opacity: 0.65;
    }

    @keyframes spinGlow { to { transform: rotate(360deg); } }

    /* Neon cursor glow */
    .cursor-glow {
      position: fixed;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(138,92,255,0.28), rgba(56,182,255,0.16), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: -1;
      mix-blend-mode: screen;
      transition: opacity 240ms ease;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: -2;
    }

    .particle {
      position: absolute;
      width: 4px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(138, 92, 255, 0.8), rgba(56,182,255,0.8));
      opacity: 0.35;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(18vh) translateX(0) scale(0.8); opacity: 0; }
      10%, 85% { opacity: 0.4; }
      to { transform: translateY(-110vh) translateX(18px) scale(1.2); opacity: 0; }
    }

    .container { width: var(--container); margin-inline: auto; }

    .glass {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .gradient-border {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .gradient-border::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(120deg, rgba(138,92,255,0.8), rgba(56,182,255,0.75), rgba(255,78,205,0.8));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 2;
      opacity: .85;
    }

    .hidden { display: none !important; }

    /* Custom scrollbar */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--accent-1), var(--accent-2));
      border-radius: 50px;
      box-shadow: 0 0 10px rgba(56, 182, 255, 0.6);
    }

    nav {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: var(--container);
      height: var(--nav-h);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
      transition: transform var(--transition), background var(--transition);
    }

    .logo {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 0.4px;
      background: linear-gradient(95deg, #fff, #8a5cff 45%, #38b6ff 75%, #ff4ecd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      position: relative;
      opacity: 0.9;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-3));
      transition: width var(--transition);
    }

    .nav-link:hover::after,
    .nav-link:focus-visible::after { width: 100%; }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn,
    .theme-toggle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      display: grid;
      place-content: center;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .icon-btn:hover,
    .theme-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 3px rgba(138, 92, 255, 0.22), 0 0 20px rgba(56, 182, 255, 0.38);
      background: rgba(255, 255, 255, 0.12);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      background: linear-gradient(135deg, rgba(138,92,255,0.28), rgba(56,182,255,0.32));
      border: 1px solid rgba(255,255,255,0.25);
    }

    main { padding-top: calc(var(--nav-h) + 58px); }

    .hero {
      position: relative;
      padding: 44px 0 30px;
      overflow: hidden;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 14ch;
    }

    .hero h1 .grad {
      background: linear-gradient(95deg, #fff 8%, #9d8bff 34%, #42c7ff 62%, #ff80d9 84%);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 5s linear infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .hero p {
      max-width: 62ch;
      color: var(--muted);
      margin: 16px 0 26px;
      font-size: 1.06rem;
      line-height: 1.6;
    }

    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .chip {
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: .88rem;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    }

    .chip:hover {
      transform: translateY(-2px);
      border-color: rgba(138,92,255,.6);
      box-shadow: 0 0 18px rgba(138,92,255,.2);
    }

    .chat-section {
      margin-top: 16px;
      display: grid;
      gap: 18px;
    }

    .chat-card {
      border-radius: var(--radius-xl);
      padding: 20px;
      min-height: 310px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
    }

    .messages {
      max-height: 48vh;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: min(85%, 560px);
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.45;
      font-size: .95rem;
      animation: msgIn .45s ease;
      white-space: pre-wrap;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.user {
      margin-left: auto;
      border-bottom-right-radius: 6px;
      background: linear-gradient(130deg, rgba(138,92,255,.34), rgba(56,182,255,.28));
      border: 1px solid rgba(255,255,255,0.2);
    }

    .msg.ai {
      margin-right: auto;
      border-bottom-left-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 16px;
    }

    .typing i {
      width: 7px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: inline-block;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      animation: bounce .9s infinite ease-in-out;
    }

    .typing i:nth-child(2) { animation-delay: .15s; }
    .typing i:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .chat-input {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
    }

    .input-wrap {
      position: relative;
    }

    #promptInput {
      width: 100%;
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      padding: 14px 14px;
      color: var(--text);
      outline: none;
      font-size: 0.95rem;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    #promptInput::placeholder { color: color-mix(in oklab, var(--muted), transparent 15%); }

    #promptInput:focus {
      border-color: rgba(138,92,255,.7);
      box-shadow: 0 0 0 3px rgba(138,92,255,.2), 0 0 22px rgba(56,182,255,.25);
      animation: pulseFocus 1.5s ease-in-out infinite alternate;
    }

    @keyframes pulseFocus {
      from { box-shadow: 0 0 0 3px rgba(138,92,255,.2), 0 0 22px rgba(56,182,255,.25); }
      to { box-shadow: 0 0 0 3px rgba(255,78,205,.18), 0 0 28px rgba(255,78,205,.18); }
    }

    .send-btn,
    .voice-btn {
      border: none;
      border-radius: 14px;
      padding: 0 14px;
      min-width: 48px;
      cursor: pointer;
      color: white;
      font-weight: 600;
      background: linear-gradient(120deg, var(--accent-1), var(--accent-2), var(--accent-3));
      background-size: 200% 100%;
      transition: transform var(--transition), filter var(--transition), box-shadow var(--transition), background-position var(--transition);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .voice-btn { min-width: 46px; }

    .send-btn:hover,
    .voice-btn:hover {
      transform: translateY(-2px);
      background-position: 100% 50%;
      box-shadow: 0 0 18px rgba(138,92,255,0.48), 0 0 25px rgba(56,182,255,0.32);
      filter: saturate(1.2);
    }

    .send-btn:active,
    .voice-btn:active { transform: translateY(0) scale(.98); }

    .send-btn .ripple {
      position: absolute;
      width: 10px;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(255,255,255,.45);
      animation: ripple .55s ease-out;
      pointer-events: none;
    }

    @keyframes ripple { to { transform: translate(-50%, -50%) scale(20); opacity: 0; } }

    .results {
      margin: 28px 0 70px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .movie-card {
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transform: translateY(14px);
      opacity: 0;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .movie-card.show {
      transform: translateY(0);
      opacity: 1;
      transition: transform .55s ease, opacity .55s ease;
    }

    .movie-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 16px 42px rgba(0,0,0,.42), 0 0 24px rgba(138,92,255,.22);
    }

    .poster {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
      transition: transform .5s ease;
    }

    .movie-card:hover .poster { transform: scale(1.08); }

    .movie-content {
      padding: 12px 12px 14px;
      display: grid;
      gap: 8px;
    }

    .movie-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 650;
    }

    .rating {
      width: fit-content;
      font-size: .76rem;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
    }

    .why {
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.5;
      margin: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent 56%);
      display: flex;
      align-items: flex-end;
      padding: 12px;
      opacity: 0;
      transition: opacity var(--transition);
      font-size: .85rem;
    }

    .movie-card:hover .overlay { opacity: 1; }

    .overlay span {
      padding: 8px 11px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
    }

    .skeleton {
      height: 408px;
      border-radius: var(--radius-lg);
      background: linear-gradient(100deg, rgba(255,255,255,.05) 22%, rgba(255,255,255,.12) 34%, rgba(255,255,255,.05) 44%);
      background-size: 220% 100%;
      animation: shimmer 1.15s linear infinite;
    }

    @keyframes shimmer { to { background-position-x: -220%; } }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(12, 12, 18, 0.62);
      backdrop-filter: blur(7px);
      display: grid;
      place-items: center;
      z-index: 1200;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .modal-backdrop.open { opacity: 1; pointer-events: auto; }

    .modal {
      width: min(900px, 92vw);
      border-radius: var(--radius-xl);
      padding: 20px;
      display: grid;
      gap: 16px;
      grid-template-columns: 210px 1fr;
      transform: scale(.92) translateY(8px);
      opacity: 0;
      transition: transform var(--transition), opacity var(--transition);
      position: relative;
    }

    .modal-backdrop.open .modal { transform: scale(1) translateY(0); opacity: 1; }

    .modal img {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.2);
    }

    .modal h3 { margin: 0; font-size: 1.4rem; }
    .meta { color: var(--muted); font-size: .9rem; }
    .modal p { margin: .4rem 0; line-height: 1.6; }

    .close-modal {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,.08);
      color: var(--text);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .close-modal:hover {
      transform: rotate(90deg) scale(1.05);
      box-shadow: 0 0 0 3px rgba(255,78,205,.22);
    }

    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .6s ease, transform .6s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      nav { height: 68px; padding: 0 16px; }
      .nav-links { display: none; }
      .chat-input { grid-template-columns: 1fr auto auto; }
      .poster { height: 280px; }
      .modal { grid-template-columns: 1fr; width: min(620px, 92vw); }
      .modal img { width: min(220px, 70%); margin: 0 auto; }
    }

    @media (max-width: 560px) {
      main { padding-top: 110px; }
      .hero p { font-size: .97rem; }
      .chat-card { padding: 14px; }
      .messages { max-height: 42vh; }
      .chat-input { grid-template-columns: 1fr auto; }
      .voice-btn { display: none; }
      .results { grid-template-columns: 1fr; }
      .poster { height: 310px; }
      .chip { font-size: .82rem; }
    }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>

  <!-- Glass Navbar -->
  <nav class="glass gradient-border">
    <a class="logo" href="#">CineAI</a>
    <div class="nav-links" aria-label="Navigation links">
      <a class="nav-link" href="#chat">AI Chat</a>
      <a class="nav-link" href="#movies">Discover</a>
      <a class="nav-link" href="#">Watchlist</a>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" title="Search" aria-label="Search">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm10 2-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Toggle Theme" aria-label="Toggle light and dark theme">☼</button>
      <div class="avatar" aria-label="Profile">AI</div>
    </div>
  </nav>

  <main class="container">
    <!-- Hero -->
    <section class="hero fade-in">
      <h1>Talk to Movies <span class="grad">Like Never Before</span></h1>
      <p>
        CineAI blends conversational AI with cinematic intelligence. Describe your mood,
        genre craving, or favorite film and get emotionally tuned movie picks with context-aware explanations.
      </p>
      <div class="chips" id="exampleChips">
        <button class="chip" data-prompt="Mind-blowing movies">Mind-blowing movies</button>
        <button class="chip" data-prompt="Sad but beautiful">Sad but beautiful</button>
        <button class="chip" data-prompt="Movies like Interstellar">Movies like Interstellar</button>
      </div>
    </section>

    <!-- Chat Box -->
    <section class="chat-section fade-in" id="chat">
      <div class="chat-card glass gradient-border">
        <div class="messages" id="messages" aria-live="polite"></div>
        <form class="chat-input" id="chatForm">
          <div class="input-wrap">
            <input id="promptInput" type="text" placeholder="Describe your mood or movie..." autocomplete="off" required />
          </div>
          <button class="voice-btn" type="button" title="Voice input (UI only)" aria-label="Voice input">🎙️</button>
          <button class="send-btn" id="sendBtn" type="submit">Send</button>
        </form>
      </div>
    </section>

    <!-- Dynamic Movie Results -->
    <section class="fade-in" id="movies">
      <div id="results" class="results"></div>
    </section>
  </main>

  <!-- Movie Modal -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <article class="modal glass gradient-border" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="close-modal" id="closeModal" aria-label="Close details">✕</button>
      <img id="modalPoster" src="" alt="Movie poster" />
      <div>
        <h3 id="modalTitle">Movie Title</h3>
        <div class="meta" id="modalMeta"></div>
        <p id="modalOverview"></p>
        <p><strong>Why this matches you:</strong> <span id="modalReason"></span></p>
      </div>
    </article>
  </div>

  <script>
    // =============================
    // API CONFIG (replace with your own secure backend in production)
    // =============================
    const OPENROUTER_API_KEY = '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';
    const OPENROUTER_MODEL = 'qwen/qwen3-next-80b-a3b-instruct:free';
    const TMDB_API_KEY = '1475916a8cbcba7ea4b901d22ac46e7e';

    const ui = {
      body: document.body,
      chatForm: document.getElementById('chatForm'),
      promptInput: document.getElementById('promptInput'),
      messages: document.getElementById('messages'),
      results: document.getElementById('results'),
      modalBackdrop: document.getElementById('modalBackdrop'),
      closeModal: document.getElementById('closeModal'),
      modalPoster: document.getElementById('modalPoster'),
      modalTitle: document.getElementById('modalTitle'),
      modalMeta: document.getElementById('modalMeta'),
      modalOverview: document.getElementById('modalOverview'),
      modalReason: document.getElementById('modalReason'),
      themeToggle: document.getElementById('themeToggle'),
      exampleChips: document.getElementById('exampleChips'),
      sendBtn: document.getElementById('sendBtn'),
      cursorGlow: document.getElementById('cursorGlow'),
      particles: document.getElementById('particles'),
    };

    let latestMovies = [];

    const fallbackPicks = [
      { title: 'Arrival', reason: 'Emotionally rich sci-fi with profound themes of time and connection.' },
      { title: 'Blade Runner 2049', reason: 'Visually hypnotic and reflective with a futuristic atmosphere.' },
      { title: 'Her', reason: 'A melancholic yet beautiful AI romance with deep emotional resonance.' },
      { title: 'Everything Everywhere All at Once', reason: 'Mind-bending creativity with heartfelt core.' },
      { title: 'Interstellar', reason: 'Epic scale, philosophical depth, and emotional intensity.' }
    ];

    const addMessage = (text, type = 'ai', html = false) => {
      const bubble = document.createElement('div');
      bubble.className = `msg ${type}`;
      if (html) bubble.innerHTML = text;
      else bubble.textContent = text;
      ui.messages.appendChild(bubble);
      ui.messages.scrollTop = ui.messages.scrollHeight;
      return bubble;
    };

    const showTypingIndicator = () => {
      const node = addMessage('<span class="typing"><i></i><i></i><i></i></span>', 'ai', true);
      node.dataset.typing = 'true';
      return node;
    };

    const removeTypingIndicator = () => {
      const typingNode = ui.messages.querySelector('[data-typing="true"]');
      if (typingNode) typingNode.remove();
    };

    const sparkleParticles = () => {
      const count = 30;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement('span');
        dot.className = 'particle';
        dot.style.left = `${Math.random() * 100}%`;
        dot.style.bottom = `${-8 - Math.random() * 20}px`;
        dot.style.animationDuration = `${10 + Math.random() * 18}s`;
        dot.style.animationDelay = `${Math.random() * 8}s`;
        dot.style.opacity = (0.15 + Math.random() * 0.35).toFixed(2);
        ui.particles.appendChild(dot);
      }
    };

    const installCursorGlow = () => {
      window.addEventListener('pointermove', (e) => {
        ui.cursorGlow.style.left = `${e.clientX}px`;
        ui.cursorGlow.style.top = `${e.clientY}px`;
      });
      window.addEventListener('pointerleave', () => ui.cursorGlow.style.opacity = '0');
      window.addEventListener('pointerenter', () => ui.cursorGlow.style.opacity = '1');
    };

    const sendWithRipple = (evt) => {
      const rect = ui.sendBtn.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.left = `${evt.clientX - rect.left}px`;
      ripple.style.top = `${evt.clientY - rect.top}px`;
      ui.sendBtn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 560);
    };

    ui.sendBtn.addEventListener('click', (e) => sendWithRipple(e));

    const normalizeAiOutput = (raw) => {
      // Tries to parse strict JSON first.
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.reply && Array.isArray(parsed.movies)) return parsed;
      } catch {}

      // Fallback: extract list-style items.
      const lines = raw.split('\n').map((l) => l.trim()).filter(Boolean);
      const movies = [];
      for (const line of lines) {
        const cleaned = line.replace(/^[-*\d.\)\s]+/, '');
        if (cleaned.length > 2 && /[a-zA-Z]/.test(cleaned)) {
          const title = cleaned.split(/\s[-:–|]/)[0].trim();
          if (title && title.length <= 80) {
            movies.push({ title, reason: cleaned });
          }
        }
      }
      return {
        reply: raw.slice(0, 500) || 'Here are picks I think you\'ll love.',
        movies: (movies.length ? movies : fallbackPicks).slice(0, 8)
      };
    };

    const queryOpenRouter = async (prompt) => {
      const sys = `You are CineAI, a cinematic recommendation assistant.
Return strict JSON only with keys:
{
  "reply": "2-4 sentence friendly response",
  "movies": [
    {"title": "movie title", "reason": "short reason"}
  ]
}
Give 5-8 varied movie suggestions.`;

      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': location.origin,
          'X-Title': 'CineAI'
        },
        body: JSON.stringify({
          model: OPENROUTER_MODEL,
          messages: [
            { role: 'system', content: sys },
            { role: 'user', content: prompt }
          ],
          temperature: 0.8,
          max_tokens: 560
        })
      });

      if (!response.ok) throw new Error('AI request failed');
      const data = await response.json();
      const content = data?.choices?.[0]?.message?.content?.trim() || '';
      return normalizeAiOutput(content);
    };

    const getMovieDetails = async (title) => {
      const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}`;
      const res = await fetch(searchUrl);
      if (!res.ok) throw new Error('TMDB search failed');
      const data = await res.json();
      const found = data?.results?.[0];
      if (!found) return null;

      return {
        id: found.id,
        title: found.title,
        poster: found.poster_path ? `https://image.tmdb.org/t/p/w500${found.poster_path}` : '',
        rating: typeof found.vote_average === 'number' ? found.vote_average.toFixed(1) : 'N/A',
        release: found.release_date || 'Unknown',
        overview: found.overview || 'No overview available.'
      };
    };

    const enrichMovies = async (movies) => {
      const details = await Promise.allSettled(movies.map((m) => getMovieDetails(m.title)));
      return movies.map((m, i) => {
        const detail = details[i].status === 'fulfilled' ? details[i].value : null;
        return {
          title: detail?.title || m.title,
          poster: detail?.poster || 'https://via.placeholder.com/500x750/161824/eaefff?text=CineAI',
          rating: detail?.rating || 'N/A',
          release: detail?.release || 'Unknown',
          overview: detail?.overview || m.reason,
          reason: m.reason,
        };
      });
    };

    const renderSkeletons = (count = 6) => {
      ui.results.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const sk = document.createElement('div');
        sk.className = 'skeleton glass';
        ui.results.appendChild(sk);
      }
    };

    const renderMovies = (movies) => {
      ui.results.innerHTML = '';
      latestMovies = movies;

      movies.forEach((movie, index) => {
        const card = document.createElement('article');
        card.className = 'movie-card glass gradient-border';
        card.innerHTML = `
          <img class="poster" src="${movie.poster}" alt="${movie.title} poster" loading="lazy" />
          <div class="movie-content">
            <h4 class="movie-title">${movie.title}</h4>
            <span class="rating">⭐ ${movie.rating}</span>
            <p class="why">Why this matches you: ${movie.reason}</p>
          </div>
          <div class="overlay"><span>View Details</span></div>
        `;

        card.addEventListener('click', () => openModal(movie));
        ui.results.appendChild(card);
        requestAnimationFrame(() => setTimeout(() => card.classList.add('show'), index * 55));
      });
    };

    const openModal = (movie) => {
      ui.modalPoster.src = movie.poster;
      ui.modalPoster.alt = `${movie.title} poster`;
      ui.modalTitle.textContent = movie.title;
      ui.modalMeta.textContent = `Rating: ${movie.rating} • Release: ${movie.release}`;
      ui.modalOverview.textContent = movie.overview;
      ui.modalReason.textContent = movie.reason;
      ui.modalBackdrop.classList.add('open');
      ui.modalBackdrop.setAttribute('aria-hidden', 'false');
    };

    const closeModal = () => {
      ui.modalBackdrop.classList.remove('open');
      ui.modalBackdrop.setAttribute('aria-hidden', 'true');
    };

    ui.closeModal.addEventListener('click', closeModal);
    ui.modalBackdrop.addEventListener('click', (e) => {
      if (e.target === ui.modalBackdrop) closeModal();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    const processPrompt = async (prompt) => {
      if (!prompt.trim()) return;
      addMessage(prompt, 'user');
      ui.promptInput.value = '';

      renderSkeletons();
      const typingNode = showTypingIndicator();
      ui.sendBtn.disabled = true;

      try {
        const ai = await queryOpenRouter(prompt);
        removeTypingIndicator();
        addMessage(ai.reply, 'ai');

        const enriched = await enrichMovies(ai.movies);
        renderMovies(enriched);
        document.getElementById('movies').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (error) {
        console.error(error);
        removeTypingIndicator();
        typingNode?.remove();

        const fallbackText = 'I hit a network glitch, so I picked curated recommendations for you.';
        addMessage(fallbackText, 'ai');

        const enrichedFallback = await enrichMovies(fallbackPicks);
        renderMovies(enrichedFallback);
      } finally {
        ui.sendBtn.disabled = false;
      }
    };

    ui.chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      processPrompt(ui.promptInput.value);
    });

    ui.exampleChips.addEventListener('click', (e) => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      const prompt = btn.dataset.prompt;
      ui.promptInput.value = prompt;
      processPrompt(prompt);
    });

    ui.themeToggle.addEventListener('click', () => {
      ui.body.classList.toggle('light');
      ui.themeToggle.textContent = ui.body.classList.contains('light') ? '☾' : '☼';
    });

    // Scroll reveal animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.14 });

    document.querySelectorAll('.fade-in').forEach((el) => observer.observe(el));

    // Boot sequence
    sparkleParticles();
    installCursorGlow();
    addMessage('👋 Hi! I\'m CineAI. Tell me your mood, a genre, or a movie you love, and I\'ll recommend your next watch.', 'ai');
  </script>
</body>
</html>
